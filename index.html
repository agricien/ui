<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCien Vision 2026 | El Nuevo Paradigma Agrario</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
            color: #212529;
        }
        .navbar {
            background-color: white;
            border-bottom: 1px solid #e9ecef;
        }
        .news-card {
            border: none;
            border-radius: 12px;
            transition: transform 0.2s ease;
            height: 100%;
            overflow: hidden;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.05);
            cursor: pointer;
        }
        .card-img-top {
            height: 200px;
            object-fit: cover;
        }
        .category-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            display: inline-block;
            color: #0d6efd;
        }
        .timestamp {
            font-size: 0.85rem;
            color: #6c757d;
        }
        .btn-outline-primary {
            border-radius: 20px;
            padding: 5px 20px;
            font-size: 0.9rem;
        }
        header {
            padding: 4rem 0 2rem;
            text-align: center;
        }
        .filter-btn {
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .detect-link {
            transition: opacity 0.2s;
        }
        .detect-link:hover {
            opacity: 0.7;
            text-decoration: underline !important;
        }
        #nav-brand .detect-link {
            color: inherit;
        }
        .modal-content {
            border: none;
            border-radius: 15px;
        }
        .modal-header {
            border-bottom: 1px solid #f0f0f0;
            background-color: #f8f9fa;
            border-radius: 15px 15px 0 0;
        }
        /* Banner Styles */
        .banner-container {
            position: relative;
            width: 100%;
            height: 450px;
            overflow: hidden;
            margin-bottom: 2rem;
            border-radius: 0 0 40px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .banner-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .banner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.6));
        }
        .banner-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 2rem;
        }
        .banner-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .banner-subtitle {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        /* Subtheme Accordion Styles */
        .subtheme-section {
            margin-bottom: 3rem;
        }
        .subtheme-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: white;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            cursor: pointer;
            border: 1px solid #eee;
            transition: all 0.3s ease;
        }
        .subtheme-header:hover {
            background: #f1f8ff;
            border-color: #0d6efd;
        }
        .subtheme-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #2c3e50;
            margin: 0;
        }
        .subtheme-icon {
            transition: transform 0.3s ease;
        }
        .collapsed .subtheme-icon {
            transform: rotate(-90deg);
        }
        .subtheme-content {
            overflow: hidden;
            transition: max-height 0.5s ease-out;
        }
        .collapsed + .subtheme-content {
            max-height: 0;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-bold" id="nav-brand">Cargando...</span>
            <div class="ms-auto" id="update-indicator">
                <span class="badge bg-light text-dark border timestamp" id="last-update">Actualizado: Cargando...</span>
            </div>
        </div>
    </nav>

    <div id="banner-section">
        <!-- Banner dinámico -->
    </div>

    <header class="container">
        <h1 class="display-4 fw-bold text-dark" id="main-title">Cargando...</h1>
        <p class="lead text-muted" id="main-subtitle">Por favor espere.</p>
        <div class="mt-4" id="category-filters">
            <!-- Botones generados dinámicamente -->
            <div class="text-center py-2">
                <div class="spinner-grow spinner-grow-sm text-primary" role="status">
                    <span class="visually-hidden">...</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container py-4">
        <div class="row g-4" id="news-container">
            <!-- News items will be injected here -->
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando reporte...</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal para Lectura de Reporte -->
    <div class="modal fade" id="articleModal" tabindex="-1" aria-labelledby="articleModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="articleModalLabel">Título del Artículo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4" id="articleModalBody">
                    <!-- Contenido dinámico -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-white py-5 mt-5 border-top">
        <div class="container text-center text-muted">
            <p id="footer-line1">&copy; 2026 AgriCien Precision</p>
            <p><small id="footer-line2">Cargando información del estudio...</small></p>
        </div>
    </footer>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let allNews = [];
        let mainTheme = 'Resumen';

        async function loadNews() {
            try {
                const response = await fetch(`./data/news.json?t=${new Date().getTime()}`);
                const data = await response.json();
                
                allNews = data.news || [];
                
                // Helper para convertir URLs en enlaces clicables
                const linkify = (text) => {
                    if (!text) return "";
                    
                    // Patrón 1: Formato preciso [Etiqueta:URL]
                    // Permite tener prefijo [Enlace:URL] sufijo
                    const bracketRegex = /\[([^\]]+?)\s*:\s*([^\]\s]+?)\]/g;
                    if (bracketRegex.test(text)) {
                        return text.replace(bracketRegex, (match, label, url) => {
                            const cleanUrl = url.replace(/["']/g, "");
                            return `<a href="${cleanUrl}" target="_blank" class="detect-link text-decoration-none">${label.trim()}</a>`;
                        });
                    }

                    // Patrón 2: Formato simple Etiqueta : URL (Legacy/Fallback)
                    const labeledUrlRegex = /([a-zA-Z0-9ñáéíóúÁÉÍÓÚ\s]+)\s*:\s*["']?(https?:\/\/[^\s"'<>\(\)]+)["']?/g;
                    if (labeledUrlRegex.test(text)) {
                        return text.replace(labeledUrlRegex, (match, label, url) => {
                            return `<a href="${url}" target="_blank" class="detect-link text-decoration-none">${label.trim()}</a>`;
                        });
                    }

                    // Patrón 3: URL sola (fallback total)
                    const urlRegex = /(https?:\/\/[^\s"'<>\(\)]+)/g;
                    return text.replace(urlRegex, (url) => `<a href="${url}" target="_blank" class="detect-link text-decoration-none text-primary">${url}</a>`);
                };

                // Actualizar Configuración de Empresa
                if (data.company) {
                    mainTheme = data.company.main_theme || 'Resumen';
                    if (data.company.logo && data.company.logo !== "nan") {
                        const logoHtml = `<img src="${data.company.logo}" alt="Logo" style="max-height: 40px; margin-right: 15px; vertical-align: middle;">`;
                        document.getElementById('nav-brand').insertAdjacentHTML('afterbegin', logoHtml);
                    }
                }

                // Actualizar Encabezado
                if (data.header) {
                    const blackPart = linkify(data.header.brand_black);
                    const bluePart = linkify(data.header.brand_blue);
                    
                    // Asegurarnos de no sobreescribir el logo si ya se insertó
                    const brandText = `<span class="text-dark">${blackPart}</span> <span class="text-primary">${bluePart}</span>`;
                    const brandContainer = document.getElementById('nav-brand');
                    
                    // Si ya hay un img, solo actualizar el texto después de él
                    const existingImg = brandContainer.querySelector('img');
                    if (existingImg) {
                        // Limpiar nodos de texto y span, mantener img
                        Array.from(brandContainer.childNodes).forEach(node => {
                            if (node !== existingImg) brandContainer.removeChild(node);
                        });
                        brandContainer.insertAdjacentHTML('beforeend', brandText);
                    } else {
                        brandContainer.innerHTML = brandText;
                    }
                    
                    document.getElementById('main-title').innerHTML = linkify(data.header.title);
                    document.getElementById('main-subtitle').innerHTML = linkify(data.header.subtitle);
                }

                // Actualizar Pie de Página
                if (data.footer) {
                    document.getElementById('footer-line1').innerHTML = linkify(data.footer.line1);
                    document.getElementById('footer-line2').innerHTML = linkify(data.footer.line2);
                }

                document.getElementById('last-update').innerText = `Total: ${allNews.length} secciones`;
                
                renderBanner(data.banner);
                renderCategories(allNews);
                filterNews(mainTheme); // Cargar Tema Principal por defecto
            } catch (error) {
                console.error('Error cargando noticias:', error);
                document.getElementById('news-container').innerHTML = `<p class="text-center text-danger">Error al cargar datos.</p>`;
            }
        }

        function renderBanner(banners) {
            const container = document.getElementById('banner-section');
            if (!banners || banners.length === 0) {
                container.innerHTML = '';
                return;
            }

            // Por ahora mostramos el primer banner (se puede expandir a carrusel)
            const b = banners[0];
            container.innerHTML = `
                <div class="banner-container">
                    <div class="banner-slide" style="background-image: url('${b.image || 'https://picsum.photos/1200/600'}')">
                        <div class="banner-overlay"></div>
                        <div class="banner-content">
                            <h2 class="banner-title">${b.title}</h2>
                            <p class="banner-subtitle">${b.subtitle}</p>
                            <a href="${b.link || '#'}" target="_blank" class="btn btn-primary btn-lg px-5 py-3 rounded-pill fw-bold shadow-lg">
                                ${b.button_text || 'Más Información'}
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCategories(news) {
            const container = document.getElementById('category-filters');
            const categories = [...new Set(news.map(item => item.category))];
            
            let html = `<button class="btn btn-primary filter-btn px-4 m-1 shadow-sm" id="btn-resumen" onclick="filterNews('${mainTheme}')">${mainTheme}</button>`;
            
            categories.forEach(cat => {
                if (!cat || cat === 'Resumen' || cat === mainTheme) return;
                html += `<button class="btn btn-outline-secondary filter-btn px-4 m-1 shadow-sm" onclick="filterNews('${cat}')">${cat}</button>`;
            });
            
            container.innerHTML = html;
        }

        function renderNews(news) {
            const container = document.getElementById('news-container');
            container.innerHTML = '';

            if (news.length === 0) {
                container.innerHTML = '<p class="text-center w-100">No hay secciones disponibles.</p>';
                return;
            }

            // Agrupar por SubTema
            const grouped = {};
            news.forEach(item => {
                const sub = item.sub_category || 'General';
                if (!grouped[sub]) grouped[sub] = [];
                grouped[sub].push(item);
            });

            Object.keys(grouped).forEach((sub, index) => {
                const subItems = grouped[sub];
                const subId = `subtheme-${index}`;
                
                let subHtml = `
                    <div class="subtheme-section w-100">
                        <div class="subtheme-header shadow-sm" onclick="toggleSubtheme('${subId}')">
                            <h3 class="subtheme-title">
                                <span class="badge bg-primary me-2">${subItems.length}</span>
                                ${sub}
                            </h3>
                            <span class="subtheme-icon fs-4">▼</span>
                        </div>
                        <div class="subtheme-content row g-4" id="${subId}">
                `;

                subItems.forEach((item) => {
                    const card = `
                        <div class="col-md-6 col-lg-4">
                            <div class="card news-card" onclick='openArticleByTitle("${item.title.replace(/"/g, '&quot;')}")'>
                                <img src="${item.thumbnail}" class="card-img-top" alt="${item.title}" onerror="this.src='https://picsum.photos/400/250'">
                                <div class="card-body">
                                    <span class="category-badge">${item.category}</span>
                                    <h5 class="card-title fw-bold text-dark">${item.title}</h5>
                                    <p class="card-text text-muted small">${item.summary}</p>
                                    <div class="d-flex justify-content-between align-items-center mt-3">
                                        <span class="timestamp">${item.published}</span>
                                        <a href="${item.link || '#'}" target="_blank" onclick="event.stopPropagation();" class="btn btn-outline-primary btn-sm">
                                            ${item.button_text || 'Ver Original'}
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    subHtml += card;
                });

                subHtml += `</div></div>`;
                container.insertAdjacentHTML('beforeend', subHtml);
            });
        }

        function toggleSubtheme(id) {
            const el = document.getElementById(id);
            const header = el.previousElementSibling;
            header.classList.toggle('collapsed');
            
            if (header.classList.contains('collapsed')) {
                el.style.maxHeight = '0px';
                el.style.opacity = '0';
                setTimeout(() => el.style.display = 'none', 500);
            } else {
                el.style.display = 'flex';
                el.style.opacity = '1';
                el.style.maxHeight = '5000px'; // Un valor suficientemente grande
            }
        }

        function openArticleByTitle(title) {
            const item = allNews.find(n => n.title === title);
            if (!item) return;
            
            document.getElementById('articleModalLabel').innerText = item.title;
            
            let rawContent = item.content || item.summary || "No hay contenido disponible.";
            const formattedContent = rawContent.replace(/\n/g, '<br>');
            
            document.getElementById('articleModalBody').innerHTML = `
                <div class="text-center mb-4">
                    <img src="${item.thumbnail}" class="img-fluid rounded shadow" style="max-height: 400px; width: 100%; object-fit: cover;" onerror="this.src='https://picsum.photos/600/400'">
                </div>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <p class="lead fw-bold text-primary m-0">${item.category || 'General'} | ${item.sub_category || ''}</p>
                    <span class="badge bg-light text-dark">${item.published}</span>
                </div>
                <div class="article-text border-top pt-3" style="line-height: 1.8; color: #333; font-size: 1.1rem;">
                    ${formattedContent}
                </div>
                <div class="mt-4 text-center">
                    <a href="${item.link}" target="_blank" class="btn btn-primary px-4 rounded-pill">
                        ${item.button_text}
                    </a>
                </div>
            `;
            const myModal = new bootstrap.Modal(document.getElementById('articleModal'));
            myModal.show();
        }

        function filterNews(category) {
            // Estética de botones
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                if (btn.innerText === category) {
                    btn.classList.add('btn-primary');
                    btn.classList.remove('btn-outline-secondary');
                } else {
                    btn.classList.remove('btn-primary');
                    btn.classList.add('btn-outline-secondary');
                }
            });

            if (category === mainTheme) {
                const filtered = allNews.filter(n => n.is_resumen);
                renderNews(filtered);
            } else if (category === 'Todos') {
                renderNews(allNews);
            } else {
                const filtered = allNews.filter(n => n.category === category);
                renderNews(filtered);
            }
            
            // Hacer scroll suave hacia los resultados
            document.getElementById('category-filters').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // Carga inicial
        loadNews();
    </script>
</body>
</html>
