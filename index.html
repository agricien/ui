<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCien Vision 2026 | El Nuevo Paradigma Agrario</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
            color: #212529;
        }
        .navbar {
            background-color: white;
            border-bottom: 1px solid #e9ecef;
        }
        .news-card {
            border: none;
            border-radius: 12px;
            transition: transform 0.2s ease;
            height: 100%;
            overflow: hidden;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.05);
            cursor: pointer;
        }
        .card-img-top {
            height: 200px;
            object-fit: cover;
        }
        .category-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            display: inline-block;
            color: #0d6efd;
        }
        .timestamp {
            font-size: 0.85rem;
            color: #6c757d;
        }
        .btn-outline-primary {
            border-radius: 20px;
            padding: 5px 20px;
            font-size: 0.9rem;
        }
        header {
            padding: 4rem 0 2rem;
            text-align: center;
        }
        .filter-btn {
            border-radius: 25px;
            margin: 0 5px;
        }
        .modal-content {
            border: none;
            border-radius: 15px;
        }
        .modal-header {
            border-bottom: 1px solid #f0f0f0;
            background-color: #f8f9fa;
            border-radius: 15px 15px 0 0;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-bold" id="nav-brand">Cargando...</span>
            <div class="ms-auto" id="update-indicator">
                <span class="badge bg-light text-dark border timestamp" id="last-update">Actualizado: Cargando...</span>
            </div>
        </div>
    </nav>

    <header class="container">
        <h1 class="display-4 fw-bold text-dark" id="main-title">Cargando...</h1>
        <p class="lead text-muted" id="main-subtitle">Por favor espere.</p>
        <div class="mt-4" id="category-filters">
            <!-- Botones generados dinámicamente -->
            <div class="text-center py-2">
                <div class="spinner-grow spinner-grow-sm text-primary" role="status">
                    <span class="visually-hidden">...</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container py-4">
        <div class="row g-4" id="news-container">
            <!-- News items will be injected here -->
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando reporte...</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal para Lectura de Reporte -->
    <div class="modal fade" id="articleModal" tabindex="-1" aria-labelledby="articleModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="articleModalLabel">Título del Artículo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4" id="articleModalBody">
                    <!-- Contenido dinámico -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-white py-5 mt-5 border-top">
        <div class="container text-center text-muted">
            <p id="footer-line1">&copy; 2026 AgriCien Precision</p>
            <p><small id="footer-line2">Cargando información del estudio...</small></p>
        </div>
    </footer>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let allNews = [];

        async function loadNews() {
            try {
                const response = await fetch(`./data/news.json?t=${new Date().getTime()}`);
                const data = await response.json();
                
                allNews = data.news || [];
                
                // Helper para convertir URLs en enlaces clicables
                const linkify = (text) => {
                    if (!text) return "";
                    
                    // Patrón 1: Formato preciso [Etiqueta:URL]
                    // Permite tener prefijo [Enlace:URL] sufijo
                    const bracketRegex = /\[([^\]]+?)\s*:\s*([^\]\s]+?)\]/g;
                    if (bracketRegex.test(text)) {
                        return text.replace(bracketRegex, (match, label, url) => {
                            // Limpiar comillas si el usuario las puso dentro de los corchetes
                            const cleanUrl = url.replace(/["']/g, "");
                            return `<a href="${cleanUrl}" target="_blank" class="text-primary text-decoration-none">${label.trim()}</a>`;
                        });
                    }

                    // Patrón 2: Formato simple Etiqueta : URL (Legacy/Fallback)
                    const labeledUrlRegex = /([a-zA-Z0-9ñáéíóúÁÉÍÓÚ\s]+)\s*:\s*["']?(https?:\/\/[^\s"'<>\(\)]+)["']?/g;
                    if (labeledUrlRegex.test(text)) {
                        return text.replace(labeledUrlRegex, (match, label, url) => {
                            return `<a href="${url}" target="_blank" class="text-primary text-decoration-none">${label.trim()}</a>`;
                        });
                    }

                    // Patrón 3: URL sola (fallback total)
                    const urlRegex = /(https?:\/\/[^\s"'<>\(\)]+)/g;
                    return text.replace(urlRegex, (url) => `<a href="${url}" target="_blank" class="text-primary text-decoration-none">${url}</a>`);
                };

                // Actualizar Encabezado
                if (data.header) {
                    document.getElementById('nav-brand').innerHTML = `${linkify(data.header.brand_black)} <span class="text-primary">${linkify(data.header.brand_blue)}</span>`;
                    document.getElementById('main-title').innerHTML = linkify(data.header.title);
                    document.getElementById('main-subtitle').innerHTML = linkify(data.header.subtitle);
                }

                // Actualizar Pie de Página
                if (data.footer) {
                    document.getElementById('footer-line1').innerHTML = linkify(data.footer.line1);
                    document.getElementById('footer-line2').innerHTML = linkify(data.footer.line2);
                }

                document.getElementById('last-update').innerText = `Total: ${allNews.length} secciones`;
                
                renderCategories(allNews);
                filterNews('Resumen'); // Cargar Resumen por defecto
            } catch (error) {
                console.error('Error cargando noticias:', error);
                document.getElementById('news-container').innerHTML = `<p class="text-center text-danger">Error al cargar datos.</p>`;
            }
        }

        function renderCategories(news) {
            const container = document.getElementById('category-filters');
            const categories = [...new Set(news.map(item => item.category))];
            
            let html = `<button class="btn btn-primary filter-btn px-4" id="btn-resumen" onclick="filterNews('Resumen')">Resumen</button>`;
            
            categories.forEach(cat => {
                if (!cat || cat === 'Resumen') return;
                html += `<button class="btn btn-outline-secondary filter-btn px-4" onclick="filterNews('${cat}')">${cat}</button>`;
            });
            
            container.innerHTML = html;
        }

        function renderNews(news) {
            const container = document.getElementById('news-container');
            container.innerHTML = '';

            if (news.length === 0) {
                container.innerHTML = '<p class="text-center w-100">No hay secciones disponibles.</p>';
                return;
            }

            news.forEach((item) => {
                // Usar el título como ID único para la búsqueda
                const itemData = JSON.stringify(item).replace(/'/g, "&apos;");
                const card = `
                    <div class="col-md-6 col-lg-4">
                        <div class="card news-card" onclick='openArticleByTitle("${item.title.replace(/"/g, '&quot;')}")'>
                            <img src="${item.thumbnail}" class="card-img-top" alt="${item.title}" onerror="this.src='https://picsum.photos/400/250'">
                            <div class="card-body">
                                <span class="category-badge">${item.category}</span>
                                <h5 class="card-title fw-bold text-dark">${item.title}</h5>
                                <p class="card-text text-muted small">${item.summary}</p>
                                <div class="d-flex justify-content-between align-items-center mt-3">
                                    <span class="timestamp">${item.published}</span>
                                    <a href="${item.link || '#'}" target="_blank" onclick="event.stopPropagation();" class="btn btn-outline-primary btn-sm">
                                        ${item.button_text || 'Ver Original'}
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', card);
            });
        }

        function openArticleByTitle(title) {
            const item = allNews.find(n => n.title === title);
            if (!item) return;
            
            document.getElementById('articleModalLabel').innerText = item.title;
            
            let rawContent = item.content || item.summary || "No hay contenido disponible.";
            const formattedContent = rawContent.replace(/\n/g, '<br>');
            
            document.getElementById('articleModalBody').innerHTML = `
                <div class="text-center mb-4">
                    <img src="${item.thumbnail}" class="img-fluid rounded" style="max-height: 300px; width: 100%; object-fit: cover;" onerror="this.src='https://picsum.photos/600/400'">
                </div>
                <p class="lead fw-bold text-primary mb-3">${item.category || 'General'}</p>
                <div class="article-text" style="line-height: 1.8; color: #333;">
                    ${formattedContent}
                </div>
            `;
            const myModal = new bootstrap.Modal(document.getElementById('articleModal'));
            myModal.show();
        }

        function filterNews(category) {
            // Estética de botones
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                if (btn.innerText === category) {
                    btn.classList.add('btn-primary');
                    btn.classList.remove('btn-outline-secondary');
                } else {
                    btn.classList.remove('btn-primary');
                    btn.classList.add('btn-outline-secondary');
                }
            });

            if (category === 'Resumen') {
                const filtered = allNews.filter(n => n.is_resumen);
                renderNews(filtered);
            } else if (category === 'Todos') {
                renderNews(allNews);
            } else {
                const filtered = allNews.filter(n => n.category === category);
                renderNews(filtered);
            }
        }

        // Carga inicial
        loadNews();
    </script>
</body>
</html>
