    <script>
        /**
         * VARIABLES GLOBALES
         */
        let allNews = [];
        let mainTheme = 'Resumen';
        let subthemeLogos = {};

        /**
         * HELPER: Convierte texto plano con URLs en enlaces HTML.
         * Soporta formatos: [Etiqueta:URL], Etiqueta:URL, y URLs simples.
         */
        function linkify(text) {
            if (!text || text === "nan") return "";
            
            // Patrón 1: [Etiqueta:URL]
            const bracketRegex = /\[([^\]]+?)\s*:\s*([^\]\s]+?)\]/g;
            text = text.replace(bracketRegex, (match, label, url) => {
                const cleanUrl = url.replace(/["']/g, "");
                return `<a href="${cleanUrl}" target="_blank" class="detect-link text-decoration-none">${label.trim()}</a>`;
            });

            // Patrón 2: Etiqueta : URL (donde URL empieza por http)
            const labeledUrlRegex = /([a-zA-Z0-9ñáéíóúÁÉÍÓÚ\s]+)\s*:\s*["']?(https?:\/\/[^\s"'<>\(\)]+)["']?/g;
            text = text.replace(labeledUrlRegex, (match, label, url) => {
                return `<a href="${url}" target="_blank" class="detect-link text-decoration-none">${label.trim()}</a>`;
            });

            // Patrón 3: URLs sueltas
            const urlRegex = /(?<!href=["'])(https?:\/\/[^\s"'<>\(\)]+)/g;
            text = text.replace(urlRegex, (url) => `<a href="${url}" target="_blank" class="detect-link text-decoration-none text-primary">${url}</a>`);

            return text;
        }

        /**
         * CARGA INICIAL DE DATOS
         */
        async function loadNews() {
            console.log("Iniciando carga de noticias...");
            try {
                const response = await fetch(`./data/news.json?t=${new Date().getTime()}`);
                const data = await response.json();
                
                allNews = data.news || [];
                subthemeLogos = data.subtheme_logos || {};
                mainTheme = (data.company && data.company.main_theme) ? data.company.main_theme : 'Resumen';

                // 1. Actualizar Configuración de Empresa (Logo)
                if (data.company && data.company.logo && data.company.logo !== "nan") {
                    const brandContainer = document.getElementById('nav-brand');
                    if (brandContainer && !brandContainer.querySelector('img')) {
                        const logoHtml = `<img src="${data.company.logo}" alt="Logo" style="max-height: 40px; margin-right: 15px; vertical-align: middle;">`;
                        brandContainer.insertAdjacentHTML('afterbegin', logoHtml);
                    }
                }

                // 2. Actualizar Encabezado (Títulos)
                if (data.header) {
                    const blackPart = linkify(data.header.brand_black);
                    const bluePart = linkify(data.header.brand_blue);
                    const brandContainer = document.getElementById('nav-brand');
                    
                    if (brandContainer) {
                        const existingImg = brandContainer.querySelector('img');
                        const brandText = `<span class="text-dark">${blackPart}</span> <span class="text-primary">${bluePart}</span>`;
                        
                        if (existingImg) {
                            // Mantener el logo y actualizar solo el texto
                            const temp = document.createElement('div');
                            temp.innerHTML = brandText;
                            // Eliminar nodos de texto viejos
                            Array.from(brandContainer.childNodes).forEach(node => {
                                if (node !== existingImg) brandContainer.removeChild(node);
                            });
                            brandContainer.insertAdjacentHTML('beforeend', brandText);
                        } else {
                            brandContainer.innerHTML = brandText;
                        }
                    }

                    const titleEl = document.getElementById('main-title');
                    if (titleEl) titleEl.innerHTML = linkify(data.header.title);
                    
                    const subtitleEl = document.getElementById('main-subtitle');
                    if (subtitleEl) subtitleEl.innerHTML = linkify(data.header.subtitle);
                }

                // 3. Actualizar Pie de Página
                if (data.footer) {
                    const f1 = document.getElementById('footer-line1');
                    if (f1) f1.innerHTML = linkify(data.footer.line1);
                    
                    const f2 = document.getElementById('footer-line2');
                    if (f2) f2.innerHTML = linkify(data.footer.line2);
                }

                const lastUpdateEl = document.getElementById('last-update');
                if (lastUpdateEl) lastUpdateEl.innerText = `Total: ${allNews.length} secciones`;
                
                // 4. Renderizar Componentes
                renderBanner(data.banner);
                renderCategories(allNews, data.categories_order);
                
                // 5. Cargar primera categoría
                const firstCat = (data.categories_order && data.categories_order.length > 0) 
                    ? data.categories_order[0] 
                    : (allNews.length > 0 ? allNews[0].category : mainTheme);
                
                filterNews(firstCat);
                console.log("Carga completada exitosamente.");

            } catch (error) {
                console.error('Error fatal en loadNews:', error);
                const container = document.getElementById('news-container');
                if (container) container.innerHTML = `<p class="text-center text-danger">Error crítico al cargar los datos.</p>`;
            }
        }

        /**
         * RENDERIZADO DE COMPONENTES
         */
        function renderBanner(banners) {
            const container = document.getElementById('banner-section');
            if (!container) return;
            if (!banners || banners.length === 0) {
                container.innerHTML = '';
                return;
            }

            const b = banners[0];
            container.innerHTML = `
                <div class="banner-container">
                    <div class="banner-slide" style="background-image: url('${b.image || 'https://picsum.photos/1200/600'}')">
                        <div class="banner-overlay"></div>
                        <div class="banner-content">
                            <h2 class="banner-title">${b.title}</h2>
                            <p class="banner-subtitle">${b.subtitle}</p>
                            <a href="${b.link || '#'}" target="_blank" class="btn btn-primary btn-lg px-5 py-3 rounded-pill fw-bold shadow-lg">
                                ${b.button_text || 'Más Información'}
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCategories(news, order) {
            const container = document.getElementById('category-filters');
            if (!container) return;

            const categories = order || [...new Set(news.map(item => item.category))];
            let html = '';
            
            categories.forEach(cat => {
                if (!cat || cat === 'Resumen') return;
                html += `<button class="btn btn-outline-secondary filter-btn px-4 m-1 shadow-sm" onclick="filterNews('${cat}')">${cat}</button>`;
            });
            
            container.innerHTML = html;
        }

        function filterNews(category) {
            // Estética de botones activos
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.innerText === category) {
                    btn.classList.add('btn-primary');
                    btn.classList.remove('btn-outline-secondary');
                } else {
                    btn.classList.remove('btn-primary');
                    btn.classList.add('btn-outline-secondary');
                }
            });

            const container = document.getElementById('news-container');
            if (!container) return;

            if (category === mainTheme) {
                renderNews(allNews.filter(n => n.is_resumen));
            } else {
                renderNews(allNews.filter(n => n.category === category));
            }
            
            const filtersEl = document.getElementById('category-filters');
            if (filtersEl) filtersEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function renderNews(news) {
            const container = document.getElementById('news-container');
            if (!container) return;
            
            container.innerHTML = '';
            const backBtn = document.getElementById('global-back-btn');
            if (backBtn) backBtn.style.display = 'none';

            if (news.length === 0) {
                container.innerHTML = '<p class="text-center w-100 py-5">No hay contenido disponible en esta sección.</p>';
                return;
            }

            // Agrupar por SubTema
            const grouped = new Map();
            const order = [];
            
            news.forEach(item => {
                const sub = item.sub_category || 'General';
                if (!grouped.has(sub)) {
                    grouped.set(sub, []);
                    order.push(sub);
                }
                grouped.get(sub).push(item);
            });

            // Caso especial: Lista plana si solo hay un subtema igual a la categoría
            if (order.length === 1 && order[0].toLowerCase().trim() === news[0].category.toLowerCase().trim()) {
                let html = '<div class="row g-4">';
                news.forEach(item => html += generateCardHtml(item));
                html += '</div>';
                container.innerHTML = html;
                return;
            }

            // Mosaico de Subtemas
            let mosaicHtml = '<div class="mosaic-grid w-100">';
            order.forEach(sub => {
                const subItems = grouped.get(sub);
                const rep = subItems.find(item => item.is_resumen) || subItems[0];
                const cat = rep.category;
                
                let logoUrl = rep.thumbnail;
                if (subthemeLogos[cat] && subthemeLogos[cat][sub]) {
                    logoUrl = subthemeLogos[cat][sub];
                }

                mosaicHtml += `
                    <div class="subtheme-card shadow-sm" onclick="showSubthemeDetails('${sub.replace(/'/g, "\\'")}', '${cat}')">
                        <img src="${logoUrl}" alt="${sub}" onerror="this.src='https://picsum.photos/400/250'">
                        <div class="card-body">
                            <h4 class="card-title">${sub}</h4>
                            <p class="card-subtitle">${subItems.length} Elementos</p>
                            <button class="btn btn-primary btn-sm mt-3 rounded-pill">Ver Todo</button>
                        </div>
                    </div>
                `;
            });
            mosaicHtml += '</div>';
            container.innerHTML = mosaicHtml;
        }

        function showSubthemeDetails(subName, categoryName) {
            const container = document.getElementById('news-container');
            const items = allNews.filter(n => n.category === categoryName && n.sub_category === subName);
            
            const backBtn = document.getElementById('global-back-btn');
            const backLabel = document.getElementById('back-category-name');
            if (backBtn) backBtn.style.display = 'inline-block';
            if (backLabel) backLabel.innerText = categoryName;
            window.lastCategory = categoryName;

            let html = `<div class="col-12 mb-4"><h2 class="fw-bold text-primary">${subName}</h2></div>`;
            items.forEach(item => html += generateCardHtml(item));
            
            if (container) {
                container.innerHTML = `<div class="row g-4 animate__animated animate__fadeIn">${html}</div>`;
                const filtersEl = document.getElementById('category-filters');
                if (filtersEl) filtersEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function goBackToMosaic() {
            filterNews(window.lastCategory || mainTheme);
        }

        function getMediaHtml(url, classes, extraAttributes = "") {
            const videoExtensions = ['.mp4', '.mov', '.webm', '.ogg'];
            const isVideo = videoExtensions.some(ext => url.toLowerCase().endsWith(ext));
            const isGif = url.toLowerCase().endsWith('.gif');
            const style = (isGif) ? 'object-fit: contain; background: #f0f0f0;' : 'object-fit: cover;';

            if (isVideo) {
                return `<video src="${url}" class="${classes}" ${extraAttributes} loop muted playsinline onmouseover="this.play()" onmouseout="this.pause()" style="${style}"></video>`;
            } else {
                return `<img src="${url}" class="${classes}" ${extraAttributes} alt="Media" onerror="this.src='https://picsum.photos/400/250'" style="${style}">`;
            }
        }

        function generateCardHtml(item) {
            const mediaHtml = getMediaHtml(item.thumbnail, "card-img-top");
            return `
                <div class="col-md-6 col-lg-4">
                    <div class="card news-card" onclick='openArticleByTitle("${item.title.replace(/"/g, '&quot;')}")'>
                        ${mediaHtml}
                        <div class="card-body">
                            <span class="category-badge">${item.category}</span>
                            <h5 class="card-title fw-bold text-dark">${item.title}</h5>
                            <p class="card-text text-muted small">${item.summary}</p>
                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <span class="timestamp">${item.published}</span>
                                <a href="${item.link || '#'}" target="_blank" onclick="event.stopPropagation();" class="btn btn-outline-primary btn-sm">
                                    ${item.button_text || 'Ver Original'}
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function openArticleByTitle(title) {
            const item = allNews.find(n => n.title === title);
            if (!item) return;
            
            const titleEl = document.getElementById('articleModalLabel');
            if (titleEl) titleEl.innerText = item.title;
            
            const rawContent = item.content || item.summary || "No hay contenido disponible.";
            const formattedContent = rawContent.replace(/\n/g, '<br>');
            
            const videoExtensions = ['.mp4', '.mov', '.webm', '.ogg'];
            const isVideo = videoExtensions.some(ext => item.thumbnail.toLowerCase().endsWith(ext));
            const mediaModalHtml = isVideo 
                ? `<video src="${item.thumbnail}" class="img-fluid rounded shadow" controls style="max-height: 450px; width: 100%; background: #000;"></video>`
                : `<img src="${item.thumbnail}" class="img-fluid rounded shadow" style="max-height: 400px; width: 100%; object-fit: cover;" onerror="this.src='https://picsum.photos/600/400'">`;

            const bodyEl = document.getElementById('articleModalBody');
            if (bodyEl) {
                bodyEl.innerHTML = `
                    <div class="text-center mb-4">${mediaModalHtml}</div>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <p class="lead fw-bold text-primary m-0">${item.category || 'General'} | ${item.sub_category || ''}</p>
                        <span class="badge bg-light text-dark">${item.published}</span>
                    </div>
                    <div class="article-text border-top pt-3" style="line-height: 1.8; color: #333; font-size: 1.1rem;">
                        ${formattedContent}
                    </div>
                    <div class="mt-4 text-center">
                        <a href="${item.link}" target="_blank" class="btn btn-primary px-4 rounded-pill">${item.button_text}</a>
                    </div>
                `;
            }
            const modalEl = document.getElementById('articleModal');
            if (modalEl) {
                const myModal = new bootstrap.Modal(modalEl);
                myModal.show();
            }
        }

        // Ejecutar carga al terminar de leer el script
        loadNews();
    </script>
