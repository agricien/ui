<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroDashboard - Zarcero Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; }
        #map { height: 100vh; flex-grow: 1; }
        #sidebar { width: 320px; height: 100vh; background: #2c3e50; color: white; overflow-y: auto; padding: 20px; box-sizing: border-box; box-shadow: 2px 0 10px rgba(0,0,0,0.5); z-index: 1001; }
        h2 { color: #27ae60; border-bottom: 1px solid #7f8c8d; padding-bottom: 10px; margin-top: 0; }
        .card { background: #34495e; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #27ae60; }
        .label { font-size: 0.85em; color: #bdc3c7; display: block; }
        .valor { font-size: 1.2em; font-weight: bold; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75em; background: #27ae60; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>AgroMonitor Pro</h2>
    <div class="badge">Zarcero - 1070m</div>
    
    <div id="status">Cargando datos...</div>

    <div class="card">
        <span class="label">Temperatura Suelo (10cm)</span>
        <div id="soil_temp" class="valor">--</div>
    </div>

    <div class="card">
        <span class="label">Humedad del Suelo</span>
        <div id="soil_moisture" class="valor">--</div>
    </div>

    <div class="card">
        <span class="label">Clima Actual</span>
        <div id="weather_desc" class="valor">--</div>
        <span id="weather_det" class="label">Presión: -- | Viento: --</span>
    </div>

    <div class="card">
        <span class="label">Último Satélite (Sentinel-2)</span>
        <div id="sat_date" class="valor">--</div>
        <span id="sat_clouds" class="label">Nubes: --</span>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const API_KEY = '8d45d228e8aa012acddb000a8f6c7a26';
    const POLY_ID = '69f6c1ff1be1fb0008fa6ce9'; // ID de tu imagen
    
    // 1. Inicializar Mapa
    const map = L.map('map').setView([10.082, -84.508], 15);
    const baseLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Esri & AgroMonitoring'
    }).addTo(map);

    async function updateDashboard() {
        try {
            // A. Obtener Datos de Suelo
            const resSoil = await fetch(`https://api.agromonitoring.com/agro/1.0/soil?polyid=${POLY_ID}&appid=${API_KEY}`);
            const soil = await resSoil.json();
            document.getElementById('soil_temp').innerText = `${(soil.t0 - 273.15).toFixed(2)} °C`;
            document.getElementById('soil_moisture').innerText = `${(soil.moisture * 100).toFixed(2)} %`;

            // B. Obtener Clima Actual
            const resWeather = await fetch(`https://api.agromonitoring.com/agro/1.0/weather?polyid=${POLY_ID}&appid=${API_KEY}`);
            const weather = await resWeather.json();
            document.getElementById('weather_desc').innerText = weather.weather[0].description.toUpperCase();
            document.getElementById('weather_det').innerText = `P: ${weather.main.pressure} hPa | V: ${weather.wind.speed} m/s`;

            // C. Buscar Imágenes Satelitales (Últimas 2 semanas)
            const end = Math.floor(Date.now() / 1000);
            const start = end - (14 * 24 * 3600);
            const resSat = await fetch(`https://api.agromonitoring.com/agro/1.0/image/search?polyid=${POLY_ID}&start=${start}&end=${end}&appid=${API_KEY}`);
            const satData = await resSat.json();

            if (satData.length > 0) {
                const latest = satData[0];
                const date = new Date(latest.dt * 1000).toLocaleDateString();
                document.getElementById('sat_date').innerText = date;
                document.getElementById('sat_clouds').innerText = `Cobertura nubes: ${latest.clouds}%`;

                // Agregar Capa NDVI al mapa automáticamente
                L.tileLayer(latest.tile.ndvi, { opacity: 0.8 }).addTo(map);
                
                document.getElementById('status').innerHTML = "🟢 Monitoreo Activo";
            }

        } catch (e) {
            document.getElementById('status').innerText = "🔴 Error al conectar API";
            console.error(e);
        }
    }

    updateDashboard();
</script>
</body>
</html>
