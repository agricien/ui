name: Actualizar Noticias Automatizado

on:
  schedule:
    # Corre cada 6 horas
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permite correrlo manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install -r scraper_requirements.txt

      - name: Ejecutar Scraper
        run: |
          python scraper.py

      - name: Commit y Push de los cambios
        run: |
          git config --global user.name "GitHub Action Scraper"
          git config --global user.email "action@github.com"
          git add data/news.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update news database" && git push)
